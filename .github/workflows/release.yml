name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            name: chatbox-cli-windows.exe
          - os: macos-latest
            goos: darwin
            goarch: arm64
            name: chatbox-cli-macos
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            name: chatbox-cli-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.name }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            ## Chatbox-cli

            TUI-клиент для чатбокса lolz.live

            ### Скачать
            | Система | Файл |
            |---------|------|
            | 🪟 Windows | `chatbox-cli-windows.exe` |
            | 🍎 macOS (Apple Silicon) | `chatbox-cli-macos` |
            | 🐧 Linux | `chatbox-cli-linux` |

            ### Установка
            1. Скачайте файл для вашей системы
            2. Запустите — при первом запуске создастся `config.yml`
            3. Вставьте токен из https://lolz.live/account/api в `config.yml`
            4. Запустите снова — готово!
          files: artifacts/*
